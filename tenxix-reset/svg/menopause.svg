          <path d="M -50 0 Q -38 -20 -5 -12 Q 0 -8 5 -12 Q 38 -20 50 0 Q 42 14 22 13 Q 0 12 -22 13 Q -42 14 -50 0 Z" fill="url(#mpDev)"/>
