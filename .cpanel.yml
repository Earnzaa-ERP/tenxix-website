---
deployment:
  tasks:
    # ============================================
    # AUTO-DEPLOY CONFIG for cPanel Git Version Control
    # ============================================
    # 1. Update DEPLOYPATH below with YOUR cPanel home + live folder
    #    Find your cPanel username in cPanel top-right (e.g. "tenxixco")
    #    Common paths:
    #      Primary domain:  /home/USERNAME/public_html
    #      Addon domain:    /home/USERNAME/public_html/tenxix.com
    # 2. Commit + push this file to GitHub
    # 3. In cPanel Git Version Control → Update from Remote → Deploy HEAD
    # ============================================

    - export DEPLOYPATH=/home/solomon/tenxix.com

    # Clean previous deployment (keep .well-known and cgi-bin)
    - /bin/rm -rf $DEPLOYPATH/assets
    - /bin/rm -rf $DEPLOYPATH/products
    - /bin/rm -f  $DEPLOYPATH/index.html
    - /bin/rm -f  $DEPLOYPATH/about.html
    - /bin/rm -f  $DEPLOYPATH/shop.html
    - /bin/rm -f  $DEPLOYPATH/products.html
    - /bin/rm -f  $DEPLOYPATH/contact.html
    - /bin/rm -f  $DEPLOYPATH/checkout.html

    # Copy fresh HTML pages
    - /bin/cp index.html $DEPLOYPATH/
    - /bin/cp about.html $DEPLOYPATH/
    - /bin/cp shop.html $DEPLOYPATH/
    - /bin/cp products.html $DEPLOYPATH/
    - /bin/cp contact.html $DEPLOYPATH/
    - /bin/cp checkout.html $DEPLOYPATH/

    # Copy folders (with -R for recursive)
    - /bin/cp -R products $DEPLOYPATH/
    - /bin/cp -R assets $DEPLOYPATH/
